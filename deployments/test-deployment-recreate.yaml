apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: test-deploy-label
  name: test-deploy
spec:
  replicas: 10
  selector:
    matchLabels:
      app: test-deploy
  template:
    metadata:
      labels:
        app: test-deploy
    spec:
      containers:
      - image: httpd:alpine3.18
        name: httpd
  strategy:
    type: Recreate

